<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -10 620 200">
  <!--
    "cords" wordmark — styled iteration v5
    Frutiger Aero orb effect via concentric stroke layers (no raster filters on letters).
    Wider strokes = darker edge, narrower = brighter center = 3D depth.
    Oval gloss masked to inner area (never touches edges).
  -->

  <defs>
    <!-- Reusable letter shapes -->
    <g id="letters">
      <g transform="rotate(-22, 57, 90)">
        <path d="M 84,63 A 38,38 0 1,0 84,117"/>
      </g>
      <circle cx="168" cy="90" r="38"/>
      <path d="M 254,128 V 62 C 254,42 276,38 296,48"/>
      <circle cx="366" cy="90" r="38"/>
      <path d="M 404,22 V 128"/>
      <g transform="translate(8, 10)">
        <path d="M 515,52 A 25,25 0 1,0 482,90 A 25,25 0 1,1 449,128"/>
      </g>
    </g>

    <!-- Inner mask for gloss (narrower to keep shine away from edges) -->
    <mask id="glossMask">
      <use href="#letters" fill="none" stroke="white" stroke-width="22"
           stroke-linecap="round" stroke-linejoin="round"/>
    </mask>

    <!-- Base orange gradient (v3 colors) -->
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC550"/>
      <stop offset="50%" stop-color="#FF9200"/>
      <stop offset="100%" stop-color="#D06A00"/>
    </linearGradient>

    <!-- Inner bright gradient (lighter, for the 3D center) -->
    <linearGradient id="innerBright" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD470"/>
      <stop offset="45%" stop-color="#FFAA30"/>
      <stop offset="100%" stop-color="#DD7A00"/>
    </linearGradient>

    <!-- Bottom depth darkening -->
    <linearGradient id="depth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="75%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Oval gloss gradient (white shine, center-top focus) -->
    <radialGradient id="ovalGloss" cx="50%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Top edge specular -->
    <linearGradient id="edgeLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="10%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Shadow blur (applied ONLY to shadow layer, not main letters) -->
    <filter id="shadowBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- Ghost tail (behind everything) -->
  <path d="M 193,102 V 128 A 13,13 0 0,0 219,128 V 102"
        fill="none" stroke="#FF9200" stroke-width="2.5" stroke-linecap="round"
        stroke-dasharray="5 4" opacity="0.5"/>

  <!-- Drop shadow (ONLY this element is filtered — no pixelation on letters) -->
  <g filter="url(#shadowBlur)" opacity="0.18" transform="translate(0, 4)">
    <use href="#letters" fill="none" stroke="#805000" stroke-width="34"
         stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ====== CRISP VECTOR LETTERS (no filters) ====== -->

  <!-- Layer 1: Base orange (34px — outermost visible fill) -->
  <use href="#letters" fill="none" stroke="url(#base)" stroke-width="34"
       stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Layer 2: Bottom depth darkening overlay -->
  <use href="#letters" fill="none" stroke="url(#depth)" stroke-width="34"
       stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Layer 3: Inner bright (28px — 3px border stays darker = vignette edge) -->
  <use href="#letters" fill="none" stroke="url(#innerBright)" stroke-width="28"
       stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Layer 4: Glass oval gloss (masked to 22px inner area — stays away from edges) -->
  <g mask="url(#glossMask)">
    <ellipse cx="265" cy="55" rx="250" ry="40" fill="url(#ovalGloss)"/>
  </g>

  <!-- Layer 5: Top edge specular (thin bright line) -->
  <g transform="translate(0, -5)">
    <use href="#letters" fill="none" stroke="url(#edgeLight)" stroke-width="3"
         stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
