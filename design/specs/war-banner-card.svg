    <text x="106" y="851.1" font-family="JetBrains Mono" font-size="10" font-weight="700" letter-spacing="2.4" fill="#c8f562">EQUIP — ON A UNIT</text>
    <text x="106" y="873" font-family="Space Grotesk" font-size="15.5" fill="#e6ecf6">All friendly units at this location get +1 strength.</text>

    
    <rect x="61" y="892.5" width="34" height="34" rx="8" fill="#000000" fill-opacity="0.25" stroke="#7a8aa6" stroke-width="1.5"></rect>
