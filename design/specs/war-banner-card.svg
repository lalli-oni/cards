    <circle cx="668" cy="80.8" r="31" fill="url(#it-coin)" stroke="#8a6522" stroke-width="2"></circle>
    <circle cx="668" cy="80.8" r="28.5" fill="none" stroke="#ffe9a8" stroke-opacity="0.33" stroke-width="3"></circle>
    <text x="668" y="90.8" text-anchor="middle" font-family="Space Grotesk" font-size="28.5" font-weight="800" fill="#3a2205">3</text>

    
    <rect x="40" y="824.1" width="670" height="187.9" rx="10" fill="#060c18" fill-opacity="0.78" stroke="#1a2540" stroke-width="1"></rect>

    
