    <radialGradient id="it-coin" cx="35%" cy="30%" r="95%">
      <stop offset="0" stop-color="#ffe9a8"></stop>
      <stop offset="0.55" stop-color="#f4c24a"></stop>
      <stop offset="1" stop-color="#a3761a"></stop>
    </radialGradient>
  </defs>

  <g clip-path="url(#it-clip)">
