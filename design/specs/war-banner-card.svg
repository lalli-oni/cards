    <rect x="0" y="0" width="750" height="1050" fill="url(#it-hatch)"></rect>

    
    <g transform="translate(195, 303) scale(15)" stroke="#7a8aa6" opacity="0.15" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
