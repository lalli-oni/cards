<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -10 620 200">
  <!--
    "cords" wordmark — styled iteration v4
    Frutiger Aero / gemstone aesthetic using SVG lighting filters.

    Technique (per the orb tutorial):
    1. Base orange shape
    2. feDiffuseLighting on blurred alpha → 3D rounded shading per letter
    3. feSpecularLighting → sharp gloss highlights per letter
    4. Masked oval overlay → glass-like shine across top
    5. Crisp drop shadow
  -->

  <defs>
    <!-- Reusable letter shapes -->
    <g id="letters">
      <g transform="rotate(-22, 57, 90)">
        <path d="M 84,63 A 38,38 0 1,0 84,117"/>
      </g>
      <circle cx="168" cy="90" r="38"/>
      <path d="M 254,128 V 62 C 254,42 276,38 296,48"/>
      <circle cx="366" cy="90" r="38"/>
      <path d="M 404,22 V 128"/>
      <g transform="translate(8, 10)">
        <path d="M 515,52 A 25,25 0 1,0 482,90 A 25,25 0 1,1 449,128"/>
      </g>
    </g>

    <!-- Mask: white letter silhouettes for clipping overlays -->
    <mask id="letterMask">
      <use href="#letters" fill="none" stroke="white" stroke-width="34"
           stroke-linecap="round" stroke-linejoin="round"/>
    </mask>

    <!-- Base orange gradient (subtler range for lighting to modulate) -->
    <linearGradient id="baseOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFCA55"/>
      <stop offset="100%" stop-color="#EE8500"/>
    </linearGradient>

    <!-- Oval gloss gradient (the glass shine ellipse) -->
    <radialGradient id="ovalGloss" cx="50%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- 3D gemstone filter: diffuse + specular lighting + drop shadow -->
    <filter id="gem3d" x="-15%" y="-15%" width="130%" height="145%"
            color-interpolation-filters="sRGB">

      <!-- Step 1: Blur alpha to create smooth bump/height map.
           stdDeviation controls how "round" the 3D surface looks.
           ~8px gives nice convex depth for 34px-wide strokes. -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="bump"/>

      <!-- Step 2: Diffuse lighting — soft 3D form shading.
           Light from upper-left. Each letter gets independent
           depth because the bump map follows each shape's alpha. -->
      <feDiffuseLighting in="bump" surfaceScale="6" diffuseConstant="1"
                         lighting-color="white" result="diffuse">
        <fePointLight x="220" y="-100" z="300"/>
      </feDiffuseLighting>
      <feComposite in="diffuse" in2="SourceAlpha" operator="in" result="diffClip"/>

      <!-- Step 3: Multiply diffuse light map with base orange.
           Lit areas stay orange, shadow areas darken naturally. -->
      <feBlend in="SourceGraphic" in2="diffClip" mode="multiply" result="shaded"/>

      <!-- Step 4: Specular lighting — sharp gloss highlights.
           Same light position, higher exponent for tight bright spots. -->
      <feSpecularLighting in="bump" surfaceScale="4" specularConstant="1.5"
                          specularExponent="30" lighting-color="white" result="spec">
        <fePointLight x="220" y="-100" z="300"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specClip"/>

      <!-- Step 5: Add specular highlights onto shaded base.
           k2=1 keeps shaded, k3=0.6 controls highlight intensity. -->
      <feComposite in="specClip" in2="shaded" operator="arithmetic"
                   k1="0" k2="1" k3="0.6" k4="0" result="glossy"/>

      <!-- Step 6: Crisp drop shadow (low blur, subtle) -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="shadowBlur"/>
      <feOffset in="shadowBlur" dy="4" result="shadowOff"/>
      <feFlood flood-color="#806000" flood-opacity="0.18"/>
      <feComposite in2="shadowOff" operator="in" result="shadow"/>

      <!-- Final merge: shadow behind glossy letters -->
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="glossy"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ghost tail (behind everything, hidden where letters overlap) -->
  <path d="M 193,102 V 128 A 13,13 0 0,0 219,128 V 102"
        fill="none" stroke="#FF9200" stroke-width="2.5" stroke-linecap="round"
        stroke-dasharray="5 4" opacity="0.5"/>

  <!-- 3D lit letters with integrated drop shadow -->
  <g filter="url(#gem3d)">
    <use href="#letters" fill="none" stroke="url(#baseOrange)" stroke-width="34"
         stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Glass oval gloss: white-to-transparent ellipse, masked to letters.
       This is the "shine" overlay from the orb tutorial (steps 5-7).
       Spans the upper third of the word for a uniform glass highlight. -->
  <g mask="url(#letterMask)">
    <ellipse cx="265" cy="50" rx="270" ry="48" fill="url(#ovalGloss)"/>
  </g>
</svg>
