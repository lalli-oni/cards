<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 0 580 180">
  <!--
    "cords" wordmark — flat iteration v3
    The 'o' is a hidden single-story 'a': its tail is a dotted outline (ghost).
    Intentionally "derpy": tilted c, misplaced s.

    Stroke: 34px round caps, 38px radius for round letters.
    Grid: x-height top=52, bottom=128, center=90. Ascender=22.
  -->

  <!-- main letterforms -->
  <g fill="none" stroke="#1a1a2e" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <!-- c: tilted -15 deg counter-clockwise for derpy feel -->
    <g transform="rotate(-15, 57, 90)">
      <path d="M 84,63 A 38,38 0 1,0 84,117"/>
    </g>

    <!-- o: full circle (bowl of the hidden 'a') -->
    <circle cx="168" cy="90" r="38"/>

    <!-- r: vertical stem + horizontal shoulder with 90 deg curve and round terminal -->
    <path d="M 254,128 V 64 Q 254,48 282,48"/>

    <!-- d: full bubble bowl (circle) + separate ascender stem -->
    <circle cx="362" cy="90" r="38"/>
    <path d="M 400,22 V 128"/>

    <!-- s: offset down-right for intentionally misplaced derpy feel -->
    <g transform="translate(8, 10)">
      <path d="M 511,52 A 25,25 0 1,0 478,90 A 25,25 0 1,1 445,128"/>
    </g>
  </g>

  <!-- ghost tail: dotted outline hinting at the hidden 'a' in the 'o' -->
  <path d="M 198,114 C 206,130 204,144 198,148"
        fill="none" stroke="#1a1a2e" stroke-width="6" stroke-linecap="round"
        stroke-dasharray="0.1 10" opacity="0.5"/>
</svg>
