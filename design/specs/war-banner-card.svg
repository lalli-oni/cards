<svg xmlns="http://www.w3.org/2000/svg" width="750" height="1050" viewBox="0 0 750 1050">
  
  
  <defs>
    <clipPath id="it-clip"><rect x="0" y="0" width="750" height="1050" rx="14"></rect></clipPath>
