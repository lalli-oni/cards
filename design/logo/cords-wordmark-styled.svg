<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -10 620 200">
  <!--
    "cords" wordmark — styled iteration v3
    Gemstone/jewel aesthetic: sharp highlights, crisp edges, no blur glow.
    Same letter shapes as the flat version.
  -->

  <defs>
    <!-- Reusable letter shapes -->
    <g id="letters">
      <g transform="rotate(-22, 57, 90)">
        <path d="M 84,63 A 38,38 0 1,0 84,117"/>
      </g>
      <circle cx="168" cy="90" r="38"/>
      <path d="M 254,128 V 62 C 254,42 276,38 296,48"/>
      <circle cx="366" cy="90" r="38"/>
      <path d="M 404,22 V 128"/>
      <g transform="translate(8, 10)">
        <path d="M 515,52 A 25,25 0 1,0 482,90 A 25,25 0 1,1 449,128"/>
      </g>
    </g>

    <!-- Base: rich orange, fully opaque -->
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC550"/>
      <stop offset="45%" stop-color="#FF9200"/>
      <stop offset="100%" stop-color="#D06A00"/>
    </linearGradient>

    <!-- Sharp highlight band: concentrated bright streak near top (gemstone facet) -->
    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="10%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="32%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom depth: subtle darkening -->
    <linearGradient id="depth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="75%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Bottom facet reflection (gemstones catch light underneath) -->
    <linearGradient id="bottomFacet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="88%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Top edge specular line -->
    <linearGradient id="edgeLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="10%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Crisp drop shadow only (no glow, low blur) -->
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="125%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feOffset in="blur" dy="4" result="off"/>
      <feFlood flood-color="#805000" flood-opacity="0.2"/>
      <feComposite in2="off" operator="in" result="dropShadow"/>
      <feMerge>
        <feMergeNode in="dropShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ghost tail: rendered BEHIND letters so overlap is hidden -->
  <path d="M 193,102 V 128 A 13,13 0 0,0 219,128 V 102"
        fill="none" stroke="#FF9200" stroke-width="2.5" stroke-linecap="round"
        stroke-dasharray="5 4" opacity="0.5"/>

  <!-- ====== RENDERED LETTERS ====== -->
  <g filter="url(#shadow)">

    <!-- Layer 1: Base orange (fully opaque, covers ghost tail overlap) -->
    <use href="#letters" fill="none" stroke="url(#base)" stroke-width="34"
         stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Layer 2: Bottom depth darkening -->
    <use href="#letters" fill="none" stroke="url(#depth)" stroke-width="34"
         stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Layer 3: Bottom facet reflection -->
    <use href="#letters" fill="none" stroke="url(#bottomFacet)" stroke-width="34"
         stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Layer 4: Sharp gemstone highlight band (slightly thinner, offset up) -->
    <g transform="translate(0, -1)">
      <use href="#letters" fill="none" stroke="url(#highlight)" stroke-width="30"
           stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Layer 5: Top edge specular line (thin, crisp) -->
    <g transform="translate(0, -5)">
      <use href="#letters" fill="none" stroke="url(#edgeLight)" stroke-width="3"
           stroke-linecap="round" stroke-linejoin="round"/>
    </g>

  </g>
</svg>
